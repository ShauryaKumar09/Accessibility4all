<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dyslexia Font</title>
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      color: #202124;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      cursor: pointer;
    }

    #status {
      min-height: 18px;
      margin-top: 8px;
      color: #137333;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>Dyslexia Font</h1>
  <label>
    <input id="enabled" type="checkbox">
    Enable on websites
  </label>
  <button id="options">Open font settings</button>
  <div id="status" role="status"></div>
  <script src="popup.js"></script>
</body>
</html>
